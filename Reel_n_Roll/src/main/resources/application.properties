spring.datasource.url=jdbc:mysql://localhost:3306/iste240?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.continue-on-error=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.mustache.check-template-location=false
spring.jpa.open-in-view=false

spring.sql.init.data-locations=classpath:sql/movies.sql,\
  classpath:sql/SeatRecords.sql,\
  classpath:sql/ShowtimeRecords.sql,\
  classpath:sql/theatre.sql
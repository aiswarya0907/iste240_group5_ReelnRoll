<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Theatre Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            background:#121212;
            color:white;
        }

        .card{
            background:#1e1e1e;
            border:none;
            border-radius:15px;
        }

        .table{
            color:white;
        }

        .table thead{
            background:#343a40;
        }

        .btn{
            border-radius:10px;
        }

        h1{
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">🎬 Theatre Management</h1>

    <div class="mb-3">
        <a href="/index.html" class="btn btn-secondary">← Back to Home</a>
    </div>

    <div class="card p-4 mb-4">

        <div class="row g-3">

            <input type="hidden" id="theatreId">

            <div class="col-md-4">
                <input type="text" id="theatreName" class="form-control" placeholder="Theatre Name">
            </div>

            <div class="col-md-4">
                <input type="text" id="location" class="form-control" placeholder="Location">
            </div>

            <div class="col-md-4">
                <input type="number" id="totalScreens" class="form-control" placeholder="Total Screens">
            </div>

            <div class="col-md-12 d-grid">
                <button class="btn btn-success" onclick="saveTheatre()">Save Theatre</button>
            </div>

        </div>
    </div>

    <div class="card p-4 mb-4">

        <div class="row g-3">

            <div class="col-md-9">
                <input type="text" id="searchText" class="form-control" placeholder="Search by Theatre Name">
            </div>

            <div class="col-md-3 d-grid">
                <button class="btn btn-primary" onclick="searchTheatre()">Search</button>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Screens</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

    $(document).ready(function(){
        loadTheatres();
    });

    function loadTheatres(){

        $.get("/api/theatres", function(data){

            let rows = "";

            data.forEach(function(t){

                rows += `
            <tr>
                <td>${t.theatreId}</td>
                <td>${t.theatreName}</td>
                <td>${t.location}</td>
                <td>${t.totalScreens}</td>
                <td>
                    <button class="btn btn-warning btn-sm me-1"
                    onclick="editTheatre(${t.theatreId}, '${t.theatreName}', '${t.location}', ${t.totalScreens})">
                    Edit
                    </button>

                    <button class="btn btn-danger btn-sm"
                    onclick="deleteTheatre(${t.theatreId})">
                    Delete
                    </button>
                </td>
            </tr>
            `;
            });

            $("#tableBody").html(rows);
        });
    }

    function saveTheatre(){

        let id = $("#theatreId").val();

        let theatre = {
            theatreName: $("#theatreName").val(),
            location: $("#location").val(),
            totalScreens: $("#totalScreens").val()
        };

        if(id == ""){

            $.ajax({
                url: "/api/theatres",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(theatre),

                success:function(){
                    clearForm();
                    loadTheatres();
                }
            });

        } else {

            $.ajax({
                url: "/api/theatres/" + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(theatre),

                success:function(){
                    clearForm();
                    loadTheatres();
                }
            });
        }
    }

    function editTheatre(id, name, location, screens){

        $("#theatreId").val(id);
        $("#theatreName").val(name);
        $("#location").val(location);
        $("#totalScreens").val(screens);
    }

    function deleteTheatre(id){

        $.ajax({
            url: "/api/theatres/" + id,
            type: "DELETE",

            success:function(){
                loadTheatres();
            }
        });
    }

    function searchTheatre(){

        let name = $("#searchText").val();

        $.get("/api/theatres/search?name=" + name, function(data){

            let rows = "";

            data.forEach(function(t){

                rows += `
            <tr>
                <td>${t.theatreId}</td>
                <td>${t.theatreName}</td>
                <td>${t.location}</td>
                <td>${t.totalScreens}</td>
                <td>
                    <button class="btn btn-warning btn-sm me-1"
                    onclick="editTheatre(${t.theatreId}, '${t.theatreName}', '${t.location}', ${t.totalScreens})">
                    Edit
                    </button>

                    <button class="btn btn-danger btn-sm"
                    onclick="deleteTheatre(${t.theatreId})">
                    Delete
                    </button>
                </td>
            </tr>
            `;
            });

            $("#tableBody").html(rows);
        });
    }

    function clearForm(){
        $("#theatreId").val("");
        $("#theatreName").val("");
        $("#location").val("");
        $("#totalScreens").val("");
    }

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #121212; color: white; }
        .card { background: #1e1e1e; border: none; border-radius: 15px; }
        .table { color: white; }
        .table thead { background: #343a40; }
        .btn { border-radius: 10px; }
        h1 { font-weight: bold; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .loading-spinner { display: none; text-align: center; padding: 20px; }
        .form-control { background: #2a2a2a; color: white; border: 1px solid #444; }
        .form-control::placeholder { color: #888; }
        .form-control:focus { background: #2a2a2a; color: white; border-color: #e94560; box-shadow: none; }
        
        .card h5 {
            color: #e94560;
            font-weight: 600;
            border-left: 4px solid #e94560;
            padding-left: 12px;
        }

    </style>
</head>
<body>

<div class="toast-container">
    <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">Action completed!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="container mt-5">

    <h1 class="text-center mb-4">Movies</h1>

    <div class="mb-3">
        <a href="/index.html" class="btn btn-secondary">← Back to Home</a>
    </div>


    <div class="card p-4 mb-4">
        <h5 class="mb-3">Add or Edit Movie</h5>
        <div class="row g-3">
            <input type="hidden" id="movieId">
            <div class="col-md-4">
                <input type="text" id="title" class="form-control" placeholder="Title">
            </div>
            <div class="col-md-4">
                <input type="text" id="genre" class="form-control" placeholder="Genre">
            </div>
            <div class="col-md-4">
                <input type="text" id="language" class="form-control" placeholder="Language">
            </div>
            <div class="col-md-4">
                <input type="number" id="duration" class="form-control" placeholder="Duration (mins)">
            </div>
            <div class="col-md-4">
                <input type="text" id="rating" class="form-control" placeholder="Rating (e.g. PG-13)">
            </div>
            <div class="col-md-4">
                <input type="text" id="description" class="form-control" placeholder="Description">
            </div>
            <div class="col-md-6 d-grid">
                <button class="btn btn-success" onclick="saveMovie()"> Save Movie</button>
            </div>
            <div class="col-md-6 d-grid">
                <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </div>
    </div>


    <div class="card p-4 mb-4">
        <h5 class="mb-3">Search Movies</h5>
        <div class="row g-3">
            <div class="col-md-5">
                <input type="text" id="searchText" class="form-control" placeholder="Search by Title">
            </div>
            <div class="col-md-2 d-grid">
                <button class="btn btn-primary" onclick="searchMovie()">Search Title</button>
            </div>
            <div class="col-md-3">
                <input type="text" id="genreText" class="form-control" placeholder="Search by Genre">
            </div>
            <div class="col-md-2 d-grid">
                <button class="btn btn-warning" onclick="searchByGenre()">Search Genre</button>
            </div>
        </div>
    </div>


    <div class="card p-4 mb-4">
        <h5 class="mb-3">Update Movie Title by ID</h5>
        <div class="row g-3">
            <div class="col-md-3">
                <input type="number" id="updateId" class="form-control" placeholder="Movie ID">
            </div>
            <div class="col-md-6">
                <input type="text" id="updateTitleInput" class="form-control" placeholder="New Title">
            </div>
            <div class="col-md-3 d-grid">
                <button class="btn btn-info" onclick="updateTitle()">✏Update Title</button>
            </div>
        </div>
    </div>

    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Genre</th>
                    <th>Language</th>
                    <th>Duration</th>
                    <th>Rating</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

    $(document).ready(function () {
        loadMovies();
    });

    function showToast(message) {
        $("#toastMessage").text(message);
        let toast = new bootstrap.Toast(document.getElementById("successToast"));
        toast.show();
    }

    function showLoading() {
        $("#loadingSpinner").show();
        $("#tableBody").html("");
    }

    function hideLoading() {
        $("#loadingSpinner").hide();
    }

    function loadMovies() {
        showLoading();
        $.get("/api/movies", function (data) {
            hideLoading();
            renderTable(data);
        }).fail(function () {
            hideLoading();
            $("#tableBody").html('<tr><td colspan="8" class="text-center text-danger">Failed to load movies</td></tr>');
        });
    }

    function renderTable(data) {
        let rows = "";
        if (data.length === 0) {
            rows = '<tr><td colspan="8" class="text-center">No movies found</td></tr>';
        } else {
            data.forEach(function (m) {
                rows += '<tr>' +
                    '<td>' + m.id + '</td>' +
                    '<td>' + m.title + '</td>' +
                    '<td>' + m.genre + '</td>' +
                    '<td>' + m.language + '</td>' +
                    '<td>' + m.duration + ' mins</td>' +
                    '<td>' + m.rating + '</td>' +
                    '<td>' + m.description + '</td>' +
                    '<td>' +
                    '<button class="btn btn-warning btn-sm me-1" onclick="editMovie(' + m.id + ')">Edit</button>' +
                    '<button class="btn btn-danger btn-sm" onclick="deleteMovie(' + m.id + ')">Delete</button>' +
                    '</td>' +
                    '</tr>';
            });
        }
        $("#tableBody").html(rows);
    }

    function saveMovie() {
        let id = $("#movieId").val();

        let movie = {
            title: $("#title").val(),
            genre: $("#genre").val(),
            language: $("#language").val(),
            duration: $("#duration").val() ? parseInt($("#duration").val()) : 0,
            rating: $("#rating").val(),
            description: $("#description").val()
        };

        if (id === "") {
            $.ajax({
                url: "/api/movies",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(movie),
                success: function () {
                    clearForm();
                    loadMovies();
                    showToast("Movie added successfully!");
                },
                error: function () {
                    alert("Failed to add movie!");
                }
            });
        } else {
            $.ajax({
                url: "/api/movies/" + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(movie),
                success: function () {
                    clearForm();
                    loadMovies();
                    showToast("Movie updated successfully!");
                },
                error: function () {
                    alert("Failed to update movie!");
                }
            });
        }
    }

    function editMovie(id) {
        $.get("/api/movies/" + id, function (m) {
            $("#movieId").val(m.id);
            $("#title").val(m.title);
            $("#genre").val(m.genre);
            $("#language").val(m.language);
            $("#duration").val(m.duration);
            $("#rating").val(m.rating);
            $("#description").val(m.description);
            window.scrollTo(0, 0);
        }).fail(function () {
            alert("Failed to load movie details!");
        });
    }

    function deleteMovie(id) {
        if (confirm("Are you sure you want to delete this movie?")) {
            $.ajax({
                url: "/api/movies/" + id,
                type: "DELETE",
                success: function () {
                    loadMovies();
                    showToast("Movie deleted successfully!");
                },
                error: function () {
                    alert("Failed to delete movie!");
                }
            });
        }
    }

    function searchMovie() {
        let title = $("#searchText").val();
        if (title === "") {
            loadMovies();
            return;
        }
        showLoading();
        $.get("/api/movies/search?title=" + title, function (data) {
            hideLoading();
            renderTable(data);
        }).fail(function () {
            hideLoading();
            $("#tableBody").html('<tr><td colspan="8" class="text-center text-danger">Search failed</td></tr>');
        });
    }

    function searchByGenre() {
        let genre = $("#genreText").val();
        if (genre === "") {
            loadMovies();
            return;
        }
        showLoading();
        $.get("/api/movies/genre?genre=" + genre, function (data) {
            hideLoading();
            renderTable(data);
        }).fail(function () {
            hideLoading();
            $("#tableBody").html('<tr><td colspan="8" class="text-center text-danger">Genre search failed</td></tr>');
        });
    }

    function updateTitle() {
        let id = $("#updateId").val();
        let title = $("#updateTitleInput").val();
        if (id === "" || title === "") {
            alert("Please enter both ID and new title!");
            return;
        }
        $.ajax({
            url: "/api/movies/" + id + "/title?title=" + title,
            type: "PUT",
            success: function (response) {
                loadMovies();
                showToast(response);
                $("#updateId").val("");
                $("#updateTitleInput").val("");
            },
            error: function () {
                alert("Failed to update title!");
            }
        });
    }

    function clearForm() {
        $("#movieId").val("");
        $("#title").val("");
        $("#genre").val("");
        $("#language").val("");
        $("#duration").val("");
        $("#rating").val("");
        $("#description").val("");
    }

</script>
</body>
</html>
